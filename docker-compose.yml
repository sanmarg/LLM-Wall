services:
  # ─────────────────────────────────────────────
  # LLM Wall Backend (FastAPI)
  # ─────────────────────────────────────────────
  llm-wall:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-wall-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data          # Ledger + Q-table persistence
    networks:
      - llmwall-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  # React Dashboard (Vite dev server)
  # ─────────────────────────────────────────────
  dashboard:
    image: node:20-alpine
    container_name: llm-wall-dashboard
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    networks:
      - llmwall-net
    depends_on:
      - llm-wall

  # ─────────────────────────────────────────────
  # NGINX Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: llm-wall-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - llmwall-net
    depends_on:
      - llm-wall
      - dashboard

networks:
  llmwall-net:
    driver: bridge
